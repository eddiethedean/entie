site_name: entie
site_description: MongoDB helpers for Python — documentation for entie and entei-core
site_url: https://entie.readthedocs.io/en/latest/
repo_url: https://github.com/eddiethedean/entie
repo_name: eddiethedean/entie
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.expand
    - navigation.sections
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [packages/entie/src, packages/entei-core/src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting started: getting_started.md
  - Guides:
      - API overview: api_overview.md
      - Moltres comparison: moltres_comparison.md
      - Development: development.md
      - Troubleshooting: troubleshooting.md
  - Code reference:
      - entie: reference/entie.md
      - entei_core: reference/entei_core.md
