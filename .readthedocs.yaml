# Read the Docs — https://docs.readthedocs.io/en/stable/config-file/v2.html
# After connecting this repo, use project slug "entie" so the docs URL matches
# https://entie.readthedocs.io/ (or update mkdocs.yml site_url and PyPI Documentation).

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

python:
  install:
    # Order matters: entie depends on entei-core; mkdocstrings needs both importable.
    - method: pip
      path: packages/entei-core
    - method: pip
      path: packages/entie
      extra_requirements:
        - docs

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true
