[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "entie"
version = "0.2.0"
description = "MongoDB helpers on PyMongo and entei-core: connect, collection-backed frames, bulk inserts"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Odos Matthews", email = "odosmatthews@gmail.com" }]
keywords = [
    "dataframe",
    "mongodb",
    "pymongo",
    "entei-core",
    "data-engineering",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "entei-core>=0.2.0,<2",
    "pymongo>=4.6",
    "typing-extensions>=4.5",
]

[project.urls]
Homepage = "https://github.com/eddiethedean/entie"
Documentation = "https://entie.readthedocs.io/"
Repository = "https://github.com/eddiethedean/entie"
Issues = "https://github.com/eddiethedean/entie/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "mongomock>=4.1",
    "ruff>=0.6",
    "ty>=0.0.20",
]
docs = [
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.25",
]

[tool.setuptools.packages.find]
where = ["src"]
