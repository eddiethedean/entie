name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0). If empty, uses the current ref name."
        required: false
        type: string

# One `pypi-publish` invocation per job — PyPA does not support multiple
# publishes in the same job (see gh-action-pypi-publish README).

jobs:
  build-dists:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch: optional tag input; push tag: github.ref is refs/tags/v*
          ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.tag) || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build and twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Determine tag and version
        id: tag
        shell: bash
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ "$TAG" != v* ]]; then
            echo "Tag must start with 'v' (got: $TAG)" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify versions match tag
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          python <<'PY'
          import os
          import sys
          from pathlib import Path

          import tomllib

          version = os.environ["VERSION"]

          def read_version(pyproject_path: Path) -> str:
              data = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))
              return data["project"]["version"]

          root = Path("packages/entei-core/pyproject.toml")
          umbrella = Path("packages/entie/pyproject.toml")
          v_core = read_version(root)
          v_entie = read_version(umbrella)
          mismatches = []
          if v_core != version:
              mismatches.append(f"entei-core version={v_core!r} != tag {version!r}")
          if v_entie != version:
              mismatches.append(f"entie version={v_entie!r} != tag {version!r}")
          if mismatches:
              print("Version mismatch:", file=sys.stderr)
              for m in mismatches:
                  print(f"- {m}", file=sys.stderr)
              sys.exit(1)
          print(f"Versions OK: entei-core={v_core}, entie={v_entie}")
          PY

      - name: Verify __version__ in packages matches tag
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          python <<'PY'
          import os
          import sys
          from pathlib import Path

          expected = os.environ["VERSION"]

          def read_version_attr(path: Path) -> str:
              text = path.read_text(encoding="utf-8")
              for line in text.splitlines():
                  s = line.strip()
                  if s.startswith("__version__"):
                      _, _, rhs = s.partition("=")
                      return rhs.strip().strip("\"'")
              raise ValueError(f"no __version__ in {path}")

          root = Path("packages/entei-core/src/entei_core/__init__.py")
          umbrella = Path("packages/entie/src/entie/__init__.py")
          v_core = read_version_attr(root)
          v_entie = read_version_attr(umbrella)
          bad = []
          if v_core != expected:
              bad.append(f"entei_core.__version__={v_core!r} != {expected!r}")
          if v_entie != expected:
              bad.append(f"entie.__version__={v_entie!r} != {expected!r}")
          if bad:
              print("Version mismatch:", file=sys.stderr)
              for b in bad:
                  print(f"- {b}", file=sys.stderr)
              sys.exit(1)
          print(f"__version__ OK: entei_core={v_core}, entie={v_entie}")
          PY

      - name: Build entei-core (python -m build, twine check)
        working-directory: packages/entei-core
        run: |
          python -m build
          python -m twine check dist/*

      - name: Build entie (python -m build, twine check)
        working-directory: packages/entie
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload entei-core dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dists-entei-core
          path: packages/entei-core/dist

      - name: Upload entie dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dists-entie
          path: packages/entie/dist

  publish-entei-core:
    needs: build-dists
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download entei-core distributions
        uses: actions/download-artifact@v4
        with:
          name: dists-entei-core
          path: dist

      - name: Publish entei-core to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN_ENTEI_CORE || secrets.PYPI_API_TOKEN }}

  publish-entie:
    needs: build-dists
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download entie distributions
        uses: actions/download-artifact@v4
        with:
          name: dists-entie
          path: dist

      - name: Publish entie to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN_ENTIE || secrets.PYPI_API_TOKEN }}
